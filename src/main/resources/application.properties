# ==============================================================
# SERVIDOR
# Railway inyecta PORT como variable de entorno
# ==============================================================
server.port=${PORT:8080}

# ==============================================================
# DATASOURCE
# En Railway: variables MYSQLHOST, MYSQLPORT, MYSQLDATABASE,
#             MYSQLUSER, MYSQLPASSWORD son inyectadas por el plugin MySQL
# En local:   usa los valores por defecto (localhost / indecsa)
# ==============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:indecsa}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:n0m3l0}

# Pool de conexiones — evita que Railway corte conexiones idle
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1200000

# ==============================================================
# JPA / HIBERNATE
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==============================================================
# LOGS — solo errores en produccion
# ==============================================================
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ==============================================================
# JWT
# Setea JWT_SECRET en Railway con: openssl rand -base64 32
# Valor local de desarrollo incluido como fallback
# ==============================================================
app.jwt.secret=${JWT_SECRET:aW5kZWNzYS1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC0yMDI1}
app.jwt.expiration-ms=86400000

# ==============================================================
# TRANSACCIONES
# ==============================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true
