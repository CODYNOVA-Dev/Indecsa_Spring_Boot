# ==============================================================
# CONFIGURACIÓN DE DATASOURCE (CONEXIÓN A MYSQL)
# ==============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Se usa la BD 'indecsa' según el script de tablas y triggers anterior
spring.datasource.url=jdbc:mysql://localhost:3306/indecsa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=n0m3l0

# ==============================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================
# Dialecto actualizado para MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 'update' permite que Hibernate cree tablas faltantes, pero respeta los triggers manuales
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola de forma legible
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================================================
# CONFIGURACIÓN DE LOGS (DEBUG)
# ==============================================================
# Muestra el SQL ejecutado
logging.level.org.hibernate.SQL=DEBUG
# Muestra los valores reales que se pasan a los parámetros (?) del SQL
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Logs de tu propio paquete (ajusta 'com.example.demo' al nombre de tu proyecto)
logging.level.com.example.demo=DEBUG

# ==============================================================
# GESTIÓN DE TRANSACCIONES
# ==============================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# ==============================================================
# CONFIGURACIÓN ADICIONAL (OPCIONAL)
# ==============================================================
# Permite que los nombres de tablas en Java (Camello) se mapeen bien a MySQL (Guiones bajos)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl