# ==============================================================
# CONFIGURACIÓN DE DATASOURCE (CONEXIÓN A AWS RDS)
# ==============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# URL actualizada con tu endpoint de AWS y creación automática de base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==============================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================
# Dialecto para MySQL 8 (el que seleccionaste en AWS)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 'update' es ideal para el desarrollo de Indecsa; Hibernate creará las tablas en AWS
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================================================
# CONFIGURACIÓN DE LOGS (DEBUG)
# ==============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Ajusté esto al paquete estándar, cámbialo si tu base de código usa otro
logging.level.com.example.indecsa=DEBUG

# ==============================================================
# GESTIÓN DE TRANSACCIONES Y ESTRATEGIA DE NOMBRES
# ==============================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Mantiene compatibilidad entre nombres de Java (CamelCase) y MySQL (snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl