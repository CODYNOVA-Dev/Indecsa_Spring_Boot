# ==============================================================
# CONFIGURACIÓN DE DATASOURCE (CONEXIÓN A MYSQL)
# ==============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/indecsa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=n0m3l0

# ==============================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==============================================================
# CONFIGURACIÓN DE LOGS (DEBUG)
# ==============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.indecsa=DEBUG

# ==============================================================
# GESTIÓN DE TRANSACCIONES
# ==============================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# ==============================================================
# SERVIDOR
# ==============================================================
server.port=8080

# ==============================================================
# JWT
# ==============================================================
# Genera tu secret con: openssl rand -base64 32
app.jwt.secret=TU_SECRET_BASE64_AQUI
app.jwt.expiration-ms=86400000