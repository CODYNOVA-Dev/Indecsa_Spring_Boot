# ==============================================================
# SERVIDOR
# Railway inyecta PORT como variable de entorno
# ==============================================================
server.port=${PORT:8080}

# ==============================================================
# DATASOURCE
# Producción (Railway + AWS RDS): define SPRING_DATASOURCE_URL,
#   SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD como
#   variables de entorno en Railway. Esas variables sobreescriben
#   todo lo de abajo automáticamente.
#
# Local: crea un .env o exporta las variables antes de arrancar.
#   Ejemplo local sin SSL (MySQL local):
#     SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/indecsa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#
# AWS RDS requiere SSL. El valor para Railway debe ser:
#   jdbc:mysql://<host>.rds.amazonaws.com:3306/indecsa?useSSL=true&requireSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&sslMode=PREFERRED
# ==============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/indecsa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:n0m3l0}

# Pool de conexiones — evita que Railway corte conexiones idle
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1200000

# ==============================================================
# JPA / HIBERNATE
# ==============================================================
# Hibernate 6+ detecta el dialecto MySQL automáticamente desde el driver JDBC.
# MySQL8Dialect fue eliminado en Hibernate 6 — no especificar manualmente.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ==============================================================
# LOGS — solo errores en produccion
# ==============================================================
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ==============================================================
# JWT
# Setea JWT_SECRET en el entorno antes de iniciar la aplicacion
# Railway: Variables > Add Variable > JWT_SECRET = $(openssl rand -base64 32)
# Local:   crea un archivo .env o exporta la variable antes de mvn spring-boot:run
# ==============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ==============================================================
# TRANSACCIONES
# ==============================================================
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true
